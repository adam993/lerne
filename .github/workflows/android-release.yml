name: Build Android APK

# Builds the Android APK and publishes it to the rolling GitHub Release
# tagged `android-latest`. The Netlify deploy (see netlify.toml)
# 302-redirects /lerne-android.apk to that release asset.
#
# Triggers (opt-in only):
#   1. workflow_dispatch — click "Run workflow" in the Actions tab.
#   2. Pushing a version tag (`git push origin v0.3.0`).
#   3. Pushing a commit to master whose message includes `[android]`.
on:
  workflow_dispatch:
  push:
    tags: ['v*']
    branches: [master]

permissions:
  contents: write

concurrency:
  group: android-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'push' ||
      startsWith(github.ref, 'refs/tags/v') ||
      contains(github.event.head_commit.message, '[android]')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Restore stable debug keystore
        # Without this, every CI run generates a fresh ~/.android/debug.keystore
        # and the resulting APK is signed by a different key each time —
        # devices then refuse to install the new APK over the old one with
        # INSTALL_FAILED_UPDATE_INCOMPATIBLE. The secret holds a base64-encoded
        # keystore (alias: androiddebugkey, store/key pass: android, default
        # debug-style identity). Generate once, never rotate unless you're
        # ready to ask every existing user to uninstall.
        env:
          ANDROID_DEBUG_KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_DEBUG_KEYSTORE_B64:-}" ]; then
            echo "::error::ANDROID_DEBUG_KEYSTORE_B64 secret is missing or empty." >&2
            exit 1
          fi
          mkdir -p "$HOME/.android"
          printf '%s' "$ANDROID_DEBUG_KEYSTORE_B64" | base64 -d > "$HOME/.android/debug.keystore"
          if ! keytool -list -keystore "$HOME/.android/debug.keystore" -storepass android >/dev/null 2>&1; then
            echo "::error::ANDROID_DEBUG_KEYSTORE_B64 decoded but is not a valid keystore." >&2
            exit 1
          fi

      - name: Build Android APK
        run: yarn build:android

      - name: Read version
        id: version
        run: echo "version=$(node scripts/version.cjs show | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Publish APK to rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=android-latest
          VERSION="${{ steps.version.outputs.version }}"
          NOTES="Lerne v${VERSION} — built from ${GITHUB_SHA::7} on $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "Latest Android APK" \
              --notes "$NOTES" \
              --prerelease
          gh release upload "$TAG" release/lerne-android-latest.apk --clobber
          gh release edit "$TAG" --notes "$NOTES"
