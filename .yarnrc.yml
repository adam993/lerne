yarnPath: .yarn/releases/yarn-4.5.3.cjs

# nodeLinker: node-modules
#
# Capacitor's Android Gradle build hard-codes paths like
# `../node_modules/@capacitor/android/capacitor` in build.gradle, and the
# iOS scaffold likewise expects @capacitor/* under node_modules. Strict PnP
# (the yarn v4 default) makes node_modules empty, which would break those
# native builds. The `node-modules` linker keeps everything else about
# yarn v4 (lockfile, plugins, performance) but writes a real node_modules
# layout that Capacitor and electron-builder can both read.
nodeLinker: node-modules

enableTelemetry: false
